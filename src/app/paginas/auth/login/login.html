<main class="auth-page">
  <div class="hero-decor hero-decor-1"></div>
  <div class="hero-decor hero-decor-3"></div>

  <div class="auth-shell animar-subir">
    <div class="auth-card">
      <div class="auth-icone">🍽️</div>
      <span class="eyebrow">Sabor &amp; Arte</span>
      <h1 class="auth-title">Bem-vindo de volta!</h1>
      <p class="auth-subtitle">Entre para acessar suas receitas favoritas</p>

      <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="field-wrapper">
          <label class="field-label" for="email">E-mail</label>
          <div class="input-group">
            <span class="input-icon">✉</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
              formControlName="email"
            />
          </div>
        </div>

        <div class="field-wrapper">
          <label class="field-label" for="password">Senha</label>
          <div class="input-group">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              formControlName="password"
            />
          </div>
        </div>

        <button type="submit" class="btn-primario auth-submit" [disabled]="estaCarregando()">
          @if (estaCarregando()) {
            Entrando...
          } @else {
            Entrar
          }
        </button>
      </form>

      <p class="auth-switch">
        Não tem uma conta? <a routerLink="/cadastro">Cadastre-se</a>
      </p>
    </div>

    <div class="auth-imagem" aria-hidden="true"></div>
  </div>
</main>
