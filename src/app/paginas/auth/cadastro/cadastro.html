<main class="auth-page">
  <div class="hero-decor hero-decor-1"></div>
  <div class="hero-decor hero-decor-3"></div>

  <div class="auth-shell animar-subir">
    <div class="auth-imagem" aria-hidden="true"></div>

    <div class="auth-card">
      <div class="auth-icone">🍽️</div>
      <span class="eyebrow">Sabor &amp; Arte</span>
      <h1 class="auth-title">Criar sua conta</h1>
      <p class="auth-subtitle">Junte-se à nossa comunidade de cozinheiros</p>

      <form class="auth-form" [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
        <div class="field-wrapper">
          <label class="field-label" for="name">Nome completo</label>
          <div class="input-group">
            <span class="input-icon">👤</span>
            <input
              formControlName="name"
              type="text"
              id="name"
              name="name"
              placeholder="Seu nome"
              required
            />
          </div>
        </div>

        <div class="field-wrapper">
          <label class="field-label" for="email">E-mail</label>
          <div class="input-group">
            <span class="input-icon">✉</span>
            <input
              formControlName="email"
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
          </div>
        </div>

        <div class="field-wrapper">
          <label class="field-label" for="password">Senha</label>
          <div class="input-group">
            <span class="input-icon">🔒</span>
            <input
              formControlName="password"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn-primario auth-submit" [disabled]="estaCarregando()">
          @if (estaCarregando()) {
            Cadastrando...
          } @else {
            Cadastrar conta
          }
        </button>
      </form>

      <p class="auth-switch">
        Já tem uma conta? <a routerLink="/login">Entrar</a>
      </p>
    </div>
  </div>
</main>
